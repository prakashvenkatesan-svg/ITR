<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Securing Payment Terminal...</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7fb;
               display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
        .card { background:#fff; border-radius:12px; box-shadow:0 4px 24px rgba(0,0,0,.1);
                padding:48px 40px; text-align:center; max-width:420px; width:100%; }
        .spinner { width:52px; height:52px; border:5px solid #e0e7ef; border-top-color:#007bff;
                   border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 24px; }
        @keyframes spin { to { transform:rotate(360deg); } }
        h2 { color:#1a2340; margin:0 0 8px; }
        p { color:#6c757d; margin:0 0 16px; }
        .error-icon { font-size:52px; margin-bottom:16px; }
        .error-msg { color:#e53935; font-weight:500; margin-top:8px; }
    </style>
</head>
<body>

<div class="card">
    {% if error_msg %}
        <div class="error-icon">⚠️</div>
        <h2>Something went wrong</h2>
        <p class="error-msg">{{ error_msg }}</p>
        <p style="font-size:13px;">Please contact support or try again later.</p>
    {% elif redirect_url %}
        <div class="spinner"></div>
        <h2>Securing Checkout...</h2>
        <p>Connecting securely to PayU...</p>
        <script>
            setTimeout(function() {
                window.location.replace("{{ redirect_url }}");
            }, 600);
        </script>
    {% else %}
        <div class="error-icon">⚠️</div>
        <h2>System Error</h2>
        <p>Initialization failed silently.</p>
    {% endif %}
</div>

</body>
</html>
